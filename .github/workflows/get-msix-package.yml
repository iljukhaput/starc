name: Get MSIX Package
on:
  workflow_dispatch:

jobs:
  get_files:
    name: Get files
    runs-on: windows-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          run-id: 12406176708
          github-token: ${{ secrets.GH_PAT }}
          repository: iljukhaput/starc
          
      - name: Display structure of downloaded files
        run: ls -R
